name: formula bump

on:
  workflow_dispatch:
    # Runs on the default branch
    inputs:
      formula:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  bump-formula-pr:
    environment: pr-automation
    runs-on: ubuntu-24.04
    steps:
      - name: Process inputs
        id: inputs
        env:
          FORMULA: ${{ inputs.formula }}
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          if [[ "$FORMULA" =~ ^[A-Za-z0-9@._+-]+$ ]]; then
            echo "Formula: $FORMULA"
            echo "formula=$FORMULA" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid value for input 'formula': $FORMULA"
            exit 1
          fi
          if [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)(\.[0-9]+)$ ]]; then
            echo "Release version: $VERSION"
            echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid value for input 'version': $VERSION"
            exit 1
          fi

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          # The token is used for cloning and pushing.
          # It must have write access to repo contents.
          token: ${{ secrets.HOMEBREW_TAP_PR_ACCESS_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: brew-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: brew-rubygems-

      - name: Bump formula and create PR
        id: bump
        env:
          # Events created by the default GITHUB_TOKEN do not trigger workflows.
          # We use a personal access token so that PR creation triggers the tests workflow.
          # The PAT has write access to PRs.
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_ACCESS_TOKEN }}
        shell: bash
        run: |
          tmpfile=$(mktemp)
          brew bump-formula-pr --no-fork --strict --online --no-browse \
            --version ${{ steps.inputs.outputs.release_version }} \
            "${{ github.repository }}/${{ steps.inputs.outputs.formula }}" \
            | tee "$tmpfile"
          pr_url=$(tail -1 "$tmpfile")
          rm "$tmpfile"
          if [[ "$pr_url" =~ ^${{ github.server_url }}/${{ github.repository }}/pull/[0-9]+$ ]]; then
            echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to extract the URL to the PR from the last line printed by 'brew bump-formula-pr'."
            exit 1
          fi

      - name: Label PR as 'auto-pull'
        env:
          # Using a personal access token with write access to PRs.
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_ACCESS_TOKEN }}
        shell: bash
        run: |
          gh pr edit ${{ steps.bump.outputs.pr_url }} \
            --add-label 'auto-pull'
